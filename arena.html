<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <title>Aptitude Arena</title>
  <style>
    :root {
      --ocean-deep: #041e42;
      --foam: #e0f7ff;
      --gold: #f4a300;
      --gold-light: #ffd166;
      --card-glass: rgba(255,255,255,0.08);
      --card-border: rgba(178,235,242,0.24);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Outfit", sans-serif;
      background: var(--ocean-deep);
      color: var(--foam);
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(27,108,168,0.55), transparent),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(10,61,98,0.8), transparent),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(4,30,66,1), transparent);
      animation: meshShift 14s ease-in-out infinite alternate;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(178,235,242,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(178,235,242,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .bg-glow {
      position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(244,163,0,0.18), transparent 70%);
      z-index: 0; pointer-events: none;
    }
    .container {
      position: relative; z-index: 1;
      min-height: 100vh; display: grid; place-items: center;
      padding: 22px;
    }
    .card {
      width: min(850px, 100%);
      background: var(--card-glass);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 30px);
      box-shadow: 0 20px 52px rgba(0,0,0,0.38);
      text-align: center;
    }
    .top-actions {
      display: flex; justify-content: flex-end; margin-bottom: 8px;
    }
    .admin-btn {
      border: 1px solid rgba(178,235,242,0.35);
      border-radius: 10px;
      background: rgba(7,30,54,0.85);
      color: var(--foam);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(48px, 8vw, 84px);
      letter-spacing: 4px;
      background: linear-gradient(160deg, #ffffff 0%, #b2ebf2 45%, #5bc8dc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      margin-top: 2px;
      letter-spacing: 2px;
      color: rgba(224,247,255,0.72);
      text-transform: uppercase;
      font-size: 13px;
    }
    .stage { display: none; margin-top: 18px; }
    .stage.active { display: block; }
    .btn-main {
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      font-family: "Bebas Neue", sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: #041e42;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 10px 34px rgba(244,163,0,0.35);
    }
    .team-counts {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .count-btn {
      min-width: 64px;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(178,235,242,0.3);
      background: rgba(255,255,255,0.08);
      color: var(--foam);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .count-btn.active {
      border-color: rgba(255,209,102,0.75);
      background: rgba(244,163,0,0.2);
    }
    .teams-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .team-block {
      border-radius: 12px;
      border: 1px solid rgba(178,235,242,0.24);
      background: rgba(255,255,255,0.06);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .team-block input, .team-block select {
      border-radius: 8px;
      border: 1px solid rgba(178,235,242,0.35);
      background: rgba(4,30,66,0.55);
      color: var(--foam);
      padding: 8px 10px;
      outline: none;
      font-size: 14px;
      width: 100%;
    }
    .msg { min-height: 18px; margin-top: 10px; font-size: 13px; color: #ff9d9d; }
    @keyframes meshShift {
      0% { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(15deg) brightness(1.1); }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="container">
    <section class="card">
      <div class="top-actions">
        <button class="admin-btn" id="adminBtn">Admin Dashboard</button>
      </div>
      <h1 class="title">Aptitude Arena</h1>
      <p class="subtitle">Enter • Setup • Battle</p>

      <section class="stage active" id="entryStage">
        <button class="btn-main" id="enterBtn">Enter Arena</button>
      </section>

      <section class="stage" id="countStage">
        <p>Select number of teams</p>
        <div class="team-counts" id="countButtons">
          <button class="count-btn" data-count="2">2</button>
          <button class="count-btn" data-count="3">3</button>
          <button class="count-btn" data-count="4">4</button>
          <button class="count-btn" data-count="5">5</button>
        </div>
      </section>

      <section class="stage" id="detailsStage">
        <p>Enter team names and avatars</p>
        <div class="teams-grid" id="teamsGrid"></div>
        <button class="btn-main" id="finalEnterBtn" style="margin-top:14px;">Enter Arena</button>
        <p class="msg" id="detailMsg"></p>
      </section>
    </section>
  </main>

  <script>
    const avatars = ["🦁", "🐯", "🐼", "🦊", "🐸", "🐵", "🐙", "🐺", "🦅"];
    const entryStage = document.getElementById("entryStage");
    const countStage = document.getElementById("countStage");
    const detailsStage = document.getElementById("detailsStage");
    const teamsGrid = document.getElementById("teamsGrid");
    const detailMsg = document.getElementById("detailMsg");

    localStorage.removeItem("teams");
    localStorage.removeItem("teamCount");
    localStorage.removeItem("finalTeams");
    localStorage.removeItem("scores");

    function setStage(id) {
      [entryStage, countStage, detailsStage].forEach((s) => s.classList.remove("active"));
      id.classList.add("active");
    }

    document.getElementById("enterBtn").addEventListener("click", () => setStage(countStage));

    document.getElementById("countButtons").addEventListener("click", (e) => {
      const btn = e.target.closest(".count-btn");
      if (!btn) return;
      const teamCount = Number(btn.dataset.count);
      localStorage.setItem("teamCount", String(teamCount));
      document.querySelectorAll(".count-btn").forEach((b) => b.classList.toggle("active", b === btn));
      renderTeamInputs(teamCount);
      setStage(detailsStage);
    });

    function renderTeamInputs(teamCount) {
      teamsGrid.innerHTML = "";
      for (let i = 1; i <= teamCount; i++) {
        const div = document.createElement("div");
        div.className = "team-block";
        div.innerHTML = `
          <label>Team ${i} Name</label>
          <input type="text" placeholder="Team ${i}" data-name="${i}">
          <label>Avatar</label>
          <select data-avatar="${i}">
            ${avatars.map((a, idx) => `<option value="${a}" ${idx === (i - 1) % avatars.length ? "selected" : ""}>${a}</option>`).join("")}
          </select>
        `;
        teamsGrid.appendChild(div);
      }
    }

    document.getElementById("finalEnterBtn").addEventListener("click", async () => {
      const teamCount = Number(localStorage.getItem("teamCount") || 0);
      if (!teamCount) {
        detailMsg.textContent = "Please select team count first.";
        return;
      }

      const teams = [];
      for (let i = 1; i <= teamCount; i++) {
        const name = (document.querySelector(`[data-name="${i}"]`)?.value || "").trim();
        const avatar = (document.querySelector(`[data-avatar="${i}"]`)?.value || "🚩").trim();
        if (!name) {
          detailMsg.textContent = `Please enter Team ${i} name.`;
          return;
        }
        teams.push({ id: `T${i}`, name, avatar, score: 0 });
      }

      localStorage.setItem("teams", JSON.stringify(teams));

      // Compatibility with existing session API (first 3 teams only).
      const fallback = [
        { name: "Team A", avatar: "🦁" },
        { name: "Team B", avatar: "🐯" },
        { name: "Team C", avatar: "🐼" }
      ];
      const merged = [teams[0] || fallback[0], teams[1] || fallback[1], teams[2] || fallback[2]];
      sessionStorage.setItem("teamA", merged[0].name);
      sessionStorage.setItem("teamB", merged[1].name);
      sessionStorage.setItem("teamC", merged[2].name);
      sessionStorage.setItem("avatarA", merged[0].avatar);
      sessionStorage.setItem("avatarB", merged[1].avatar);
      sessionStorage.setItem("avatarC", merged[2].avatar);

      try {
        const response = await fetch("/api/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            teamA: merged[0].name,
            teamB: merged[1].name,
            teamC: merged[2].name,
            avatarA: merged[0].avatar,
            avatarB: merged[1].avatar,
            avatarC: merged[2].avatar
          })
        });
        if (response.ok) {
          const data = await response.json();
          sessionStorage.setItem("gameSessionId", String(data.sessionId));
        }
      } catch (_e) {}

      window.location.href = "backup.html";
    });

    document.getElementById("adminBtn").addEventListener("click", async () => {
      const username = prompt("Admin username:");
      if (!username) return;
      const password = prompt("Admin password:");
      if (password === null) return;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          alert(data.message || "Login failed");
          return;
        }
        localStorage.setItem("adminUser", username.trim().toLowerCase());
        window.location.href = "admin.html";
      } catch (_e) {
        alert("Could not validate admin login.");
      }
    });
  </script>
</body>
</html>
