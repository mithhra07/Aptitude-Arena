<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<title>Aptitude Arena - Login</title>
<style>
:root {
  --wood-dark: #3b1f0a;
  --wood-mid: #6b3a1f;
  --wood-light: #9c5a2e;
  --gold: #f4a300;
  --gold-bright: #ffd166;
  --gold-dark: #c47d00;
  --parchment: #fdf3dc;
  --parchment-dark: #e8d5a3;
  --ink: #2a1505;
  --sky-top: #1a3a6b;
  --sky-mid: #2d6a9f;
  --sky-low: #5bafd6;
  --glow-blue: rgba(100,200,255,0.25);
  --glow-gold: rgba(244,163,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: "Nunito", sans-serif;
  overflow: hidden;
  position: relative;
}

/* ── Sky background ── */
.sky {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0d1f45 0%, #1a3a6b 30%, #2d6a9f 60%, #5bafd6 80%, #87ceeb 100%);
  z-index: 0;
}

/* ── Stars ── */
.stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* ── Floating particles ── */
.particles {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold-bright);
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.4; }
  100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
}

/* ── Ground / Hills ── */
.ground-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 3;
  pointer-events: none;
}
.hill-back {
  fill: #1a4a2e;
}
.hill-front {
  fill: #0f3520;
}
.grass-highlight {
  fill: #2d7a4a;
}

/* ── Glowing moon ── */
.moon {
  position: fixed;
  top: 6%;
  right: 12%;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fffde8, #f4d96a 60%, #d4a820);
  box-shadow: 0 0 30px 10px rgba(255, 220, 80, 0.4), 0 0 80px 30px rgba(255,200,50,0.15);
  z-index: 4;
  animation: moonGlow 4s ease-in-out infinite alternate;
}
@keyframes moonGlow {
  0% { box-shadow: 0 0 30px 10px rgba(255,220,80,0.4), 0 0 80px 30px rgba(255,200,50,0.12); }
  100% { box-shadow: 0 0 45px 15px rgba(255,220,80,0.6), 0 0 110px 40px rgba(255,200,50,0.22); }
}

/* ── Fireflies ── */
.firefly {
  position: fixed;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #b8ff80;
  box-shadow: 0 0 6px 3px rgba(184,255,128,0.7);
  z-index: 5;
  animation: fireflyFloat linear infinite;
  pointer-events: none;
}
@keyframes fireflyFloat {
  0% { transform: translate(0,0) scale(1); opacity: 0; }
  15% { opacity: 1; }
  50% { transform: translate(var(--dx), var(--dy)) scale(0.8); opacity: 0.8; }
  85% { opacity: 1; }
  100% { transform: translate(0,0) scale(1); opacity: 0; }
}

/* ── Page layout ── */
.container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  z-index: 10;
}

/* ── Wooden frame (outer) ── */
.wood-frame {
  position: relative;
  padding: 14px;
  border-radius: 22px;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.03) 0px,
      rgba(0,0,0,0.04) 2px,
      transparent 2px,
      transparent 18px
    ),
    linear-gradient(160deg, #7a3d12 0%, #4a2008 40%, #6b3a1f 70%, #3b1f0a 100%);
  box-shadow:
    0 0 0 3px #c47d00,
    0 0 0 5px #7a4a00,
    0 25px 60px rgba(0,0,0,0.6),
    0 0 40px rgba(244,163,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.12);
  width: min(430px, 100%);
  animation: frameAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes frameAppear {
  from { transform: translateY(30px) scale(0.9); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* Corner ornaments */
.wood-frame::before, .wood-frame::after {
  content: "✦";
  position: absolute;
  color: var(--gold);
  font-size: 20px;
  line-height: 1;
  filter: drop-shadow(0 0 6px rgba(244,163,0,0.6));
}
.wood-frame::before { top: 6px; left: 10px; }
.wood-frame::after  { top: 6px; right: 10px; }

.corner-bottom-left, .corner-bottom-right {
  position: absolute;
  color: var(--gold);
  font-size: 20px;
  line-height: 1;
  filter: drop-shadow(0 0 6px rgba(244,163,0,0.6));
  z-index: 2;
}
.corner-bottom-left { bottom: 6px; left: 10px; }
.corner-bottom-right { bottom: 6px; right: 10px; }

/* ── Parchment inner ── */
.parchment {
  border-radius: 12px;
  background:
    radial-gradient(ellipse at 30% 20%, #fff8e8, transparent 50%),
    linear-gradient(170deg, #fdf3dc 0%, #f5dfa0 60%, #e8c870 100%);
  padding: clamp(18px, 4vw, 28px);
  box-shadow: inset 0 0 30px rgba(139,90,20,0.15), inset 0 2px 0 rgba(255,255,255,0.6);
  border: 1px solid rgba(180,120,20,0.3);
}

/* ── Trophy icon ── */
.trophy-wrap {
  text-align: center;
  margin-bottom: 4px;
}
.trophy-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffd166, #f4a300);
  box-shadow: 0 4px 0 #c47d00, 0 6px 20px rgba(244,163,0,0.4);
  font-size: 26px;
  animation: trophyBob 3s ease-in-out infinite;
}
@keyframes trophyBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* ── Title ── */
.title {
  font-family: "Cinzel Decorative", serif;
  font-weight: 900;
  font-size: clamp(24px, 6vw, 36px);
  text-align: center;
  color: var(--wood-dark);
  text-shadow:
    1px 1px 0 rgba(255,255,255,0.5),
    0 2px 8px rgba(139,80,10,0.3);
  letter-spacing: 1px;
  line-height: 1.1;
  margin-top: 6px;
}

.subtitle {
  text-align: center;
  font-family: "Cinzel", serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--wood-mid);
  text-transform: uppercase;
  margin-top: 4px;
  margin-bottom: 14px;
}

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 14px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, #b8860b, transparent);
}
.divider-gem {
  color: var(--gold-dark);
  font-size: 12px;
}

/* ── Tabs ── */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: rgba(59,31,10,0.12);
  border: 1px solid rgba(180,120,20,0.35);
  border-radius: 10px;
  padding: 5px;
  margin-bottom: 16px;
}
.tab-btn {
  border: none;
  border-radius: 7px;
  padding: 9px 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: "Cinzel", serif;
  letter-spacing: 1px;
  color: var(--wood-mid);
  background: transparent;
  cursor: pointer;
  transition: all 0.22s ease;
  position: relative;
}
.tab-btn.active {
  background: linear-gradient(135deg, #ffd166, #f4a300);
  color: var(--ink);
  box-shadow: 0 3px 0 #c47d00, 0 4px 12px rgba(244,163,0,0.3);
  transform: translateY(-1px);
}
.tab-btn:not(.active):hover {
  background: rgba(244,163,0,0.15);
}

/* ── Form ── */
.form-wrap {
  position: relative;
  min-height: 220px;
}
.auth-form {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: translateY(6px);
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.auth-form.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* ── Fields ── */
.field {
  margin-bottom: 12px;
}
.field label {
  display: block;
  margin-bottom: 5px;
  font-family: "Cinzel", serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--wood-dark);
  font-weight: 600;
  text-transform: uppercase;
}

.field-icon-wrap {
  position: relative;
}
.field-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}
.field input {
  width: 100%;
  border-radius: 8px;
  border: 2px solid rgba(180,120,20,0.35);
  background: rgba(255,250,230,0.8);
  color: var(--ink);
  padding: 10px 12px 10px 34px;
  font-size: 14px;
  font-family: "Nunito", sans-serif;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.field input::placeholder { color: rgba(59,31,10,0.4); }
.field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(244,163,0,0.2), inset 0 0 8px rgba(244,163,0,0.1);
}

/* ── Password wrap ── */
.pw-wrap { position: relative; }
.pw-input { padding-right: 44px !important; }
.eye-toggle {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 1px solid rgba(180,120,20,0.3);
  background: rgba(244,163,0,0.1);
  color: var(--wood-mid);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: background 0.15s ease;
}
.eye-toggle:hover { background: rgba(244,163,0,0.25); }

/* ── Submit button ── */
.submit-btn {
  width: 100%;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  padding: 13px 16px;
  font-family: "Cinzel Decorative", serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--ink);
  cursor: pointer;
  background: linear-gradient(135deg, #ffd166 0%, #f4a300 60%, #e09000 100%);
  box-shadow: 0 5px 0 #a06000, 0 8px 20px rgba(160,96,0,0.4);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  position: relative;
  top: 0;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 7px 0 #a06000, 0 12px 28px rgba(160,96,0,0.45);
}
.submit-btn:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #a06000, 0 4px 10px rgba(160,96,0,0.3);
}

/* ── Message ── */
.msg {
  margin-top: 10px;
  font-size: 12px;
  text-align: center;
  min-height: 16px;
  font-weight: 600;
}
.msg.ok { color: #1a6e2e; }
.msg.err { color: #a01010; }
</style>
</head>
<body>

<div class="sky"></div>
<div class="moon"></div>
<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<!-- Fireflies -->
<div class="firefly" style="left:15%;top:65%;--dx:40px;--dy:-50px;animation-duration:6s;animation-delay:0s;"></div>
<div class="firefly" style="left:80%;top:72%;--dx:-35px;--dy:-40px;animation-duration:8s;animation-delay:2s;"></div>
<div class="firefly" style="left:60%;top:80%;--dx:20px;--dy:-60px;animation-duration:7s;animation-delay:4s;"></div>
<div class="firefly" style="left:30%;top:75%;--dx:-25px;--dy:-30px;animation-duration:5s;animation-delay:1s;"></div>
<div class="firefly" style="left:70%;top:60%;--dx:30px;--dy:-45px;animation-duration:9s;animation-delay:3s;"></div>

<!-- Scenic hills SVG -->
<div class="ground-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 260" preserveAspectRatio="none" style="display:block;width:100%;height:200px;">
    <defs>
      <linearGradient id="hillBack" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a5c32"/>
        <stop offset="100%" stop-color="#0c3318"/>
      </linearGradient>
      <linearGradient id="hillFront" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f4520"/>
        <stop offset="100%" stop-color="#061a0d"/>
      </linearGradient>
      <linearGradient id="hillGrass" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2a7a45"/>
        <stop offset="100%" stop-color="#1a5c32"/>
      </linearGradient>
    </defs>
    <!-- Back hills -->
    <path fill="url(#hillBack)" d="M0,200 C100,100 250,60 400,120 C550,180 650,50 800,80 C950,110 1100,60 1200,100 C1300,140 1380,100 1440,120 L1440,260 L0,260 Z"/>
    <!-- Middle hill with glow highlight -->
    <path fill="url(#hillGrass)" d="M0,220 C80,160 200,120 320,150 C440,180 540,100 680,130 C820,160 940,110 1100,140 C1260,170 1380,130 1440,150 L1440,260 L0,260 Z"/>
    <!-- Front dark ground -->
    <path fill="url(#hillFront)" d="M0,245 C120,210 280,195 440,215 C600,235 740,200 880,215 C1020,230 1180,205 1340,220 C1380,225 1420,230 1440,240 L1440,260 L0,260 Z"/>
    <!-- Tiny trees left -->
    <rect fill="#082010" x="60" y="168" width="8" height="30" rx="2"/>
    <ellipse fill="#0f4520" cx="64" cy="162" rx="16" ry="20"/>
    <ellipse fill="#1a6030" cx="64" cy="155" rx="10" ry="14"/>
    <!-- Tiny trees right -->
    <rect fill="#082010" x="1320" y="152" width="8" height="30" rx="2"/>
    <ellipse fill="#0f4520" cx="1324" cy="146" rx="18" ry="22"/>
    <ellipse fill="#1a6030" cx="1324" cy="138" rx="11" ry="15"/>
    <!-- Mushroom left -->
    <rect fill="#5c2a0a" x="200" y="210" width="5" height="12" rx="2"/>
    <ellipse fill="#cc3030" cx="202" cy="208" rx="10" ry="7"/>
    <circle fill="white" cx="197" cy="207" r="2"/>
    <circle fill="white" cx="205" cy="205" r="1.5"/>
    <!-- Mushroom right -->
    <rect fill="#5c2a0a" x="1200" y="200" width="5" height="12" rx="2"/>
    <ellipse fill="#8a2be2" cx="1202" cy="198" rx="10" ry="7"/>
    <circle fill="white" cx="1197" cy="197" r="2"/>
    <circle fill="white" cx="1205" cy="195" r="1.5"/>
    <!-- Path/stones -->
    <ellipse fill="#1c3a22" cx="720" cy="248" rx="60" ry="8"/>
    <ellipse fill="#2a5532" cx="720" cy="246" rx="40" ry="5"/>
  </svg>
</div>

<main class="container">
  <div class="wood-frame">
    <span class="corner-bottom-left">✦</span>
    <span class="corner-bottom-right">✦</span>
    <div class="parchment">

      <div class="trophy-wrap">
        <div class="trophy-icon">🏆</div>
      </div>

      <h1 class="title">Aptitude Arena</h1>
      <p class="subtitle">⚔ &nbsp; Challenge your mind &nbsp; ⚔</p>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-gem">◆</span>
        <div class="divider-line"></div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabSignIn" type="button">⚔ Sign In</button>
        <button class="tab-btn" id="tabSignUp" type="button">✨ Sign Up</button>
      </div>

      <div class="form-wrap">
        <!-- Sign In -->
        <form class="auth-form active" id="signInForm">
          <div class="field">
            <label for="signinUsername">Username</label>
            <div class="field-icon-wrap">
              <span class="field-icon">🧙</span>
              <input id="signinUsername" type="text" placeholder="Enter your name, warrior" required autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
          </div>
          <div class="field">
            <label for="signinPassword">Password</label>
            <div class="pw-wrap field-icon-wrap">
              <span class="field-icon">🔑</span>
              <input id="signinPassword" class="pw-input" type="password" placeholder="Secret key" required autocomplete="off">
              <button type="button" class="eye-toggle" data-eye="signinPassword" aria-label="Show password">👁️</button>
            </div>
          </div>
          <button class="submit-btn" type="submit">Enter the Arena</button>
          <p class="msg" id="signInMsg"></p>
        </form>

        <!-- Sign Up -->
        <form class="auth-form" id="signUpForm">
          <div class="field">
            <label for="signupUsername">Choose Username</label>
            <div class="field-icon-wrap">
              <span class="field-icon">🧙</span>
              <input id="signupUsername" type="text" placeholder="Claim your name" required autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
          </div>
          <div class="field">
            <label for="signupPassword">Create Password</label>
            <div class="pw-wrap field-icon-wrap">
              <span class="field-icon">🔑</span>
              <input id="signupPassword" class="pw-input" type="password" placeholder="Forge your key" required autocomplete="off">
              <button type="button" class="eye-toggle" data-eye="signupPassword" aria-label="Show password">👁️</button>
            </div>
          </div>
          <button class="submit-btn" type="submit">Join the Arena</button>
          <p class="msg" id="signUpMsg"></p>
        </form>
      </div>

    </div><!-- /parchment -->
  </div><!-- /wood-frame -->
</main>

<script>
/* ── Stars ── */
const starsEl = document.getElementById("stars");
for (let i = 0; i < 100; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*70}%;
    width:${size}px;height:${size}px;
    animation-duration:${2+Math.random()*4}s;
    animation-delay:${Math.random()*6}s;
  `;
  starsEl.appendChild(s);
}

/* ── Particles ── */
const partEl = document.getElementById("particles");
for (let i = 0; i < 20; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.cssText = `
    left:${Math.random()*100}%;
    bottom:${Math.random()*40+10}%;
    animation-duration:${4+Math.random()*6}s;
    animation-delay:${Math.random()*8}s;
    width:${Math.random()*4+2}px;
    height:${Math.random()*4+2}px;
  `;
  partEl.appendChild(p);
}

/* ── Tab logic ── */
const tabSignIn = document.getElementById("tabSignIn");
const tabSignUp = document.getElementById("tabSignUp");
const signInForm = document.getElementById("signInForm");
const signUpForm = document.getElementById("signUpForm");
const signInMsg = document.getElementById("signInMsg");
const signUpMsg = document.getElementById("signUpMsg");

function clearInputs() {
  ["signinUsername","signinPassword","signupUsername","signupPassword"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
}

function switchTab(tab) {
  const isSignIn = tab === "signin";
  tabSignIn.classList.toggle("active", isSignIn);
  tabSignUp.classList.toggle("active", !isSignIn);
  signInForm.classList.toggle("active", isSignIn);
  signUpForm.classList.toggle("active", !isSignIn);
}

tabSignIn.addEventListener("click", () => switchTab("signin"));
tabSignUp.addEventListener("click", () => switchTab("signup"));
document.addEventListener("DOMContentLoaded", clearInputs);

/* ── Sign In ── */
signInForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  signInMsg.textContent = "";
  signInMsg.className = "msg";
  const username = document.getElementById("signinUsername").value.trim();
  const password = document.getElementById("signinPassword").value;
  try {
    const data = await postJson("/login", { username, password });
    if (!data.success) throw new Error(data.message || "Login failed.");
    localStorage.setItem("userUsername", username.toLowerCase());
    signInMsg.textContent = data.message || "Login successful.";
    signInMsg.className = "msg ok";
    setTimeout(() => { window.location.href = "arena.html"; }, 600);
  } catch (err) {
    signInMsg.textContent = err.message || "Could not login.";
    signInMsg.className = "msg err";
  }
});

/* ── Sign Up ── */
signUpForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  signUpMsg.textContent = "";
  signUpMsg.className = "msg";
  const username = document.getElementById("signupUsername").value.trim();
  const password = document.getElementById("signupPassword").value;
  try {
    const data = await postJson("/signup", { username, password });
    if (!data.success) throw new Error(data.message || "Registration failed.");
    signUpMsg.textContent = data.message || "Registered successfully.";
    signUpMsg.className = "msg ok";
    setTimeout(() => {
      switchTab("signin");
      clearInputs();
      signInMsg.textContent = "Account created. Please login.";
      signInMsg.className = "msg ok";
    }, 600);
  } catch (err) {
    signUpMsg.textContent = err.message || "Could not register.";
    signUpMsg.className = "msg err";
  }
});

/* ── Eye toggles ── */
document.querySelectorAll(".eye-toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    const input = document.getElementById(btn.dataset.eye);
    if (!input) return;
    const hidden = input.type === "password";
    input.type = hidden ? "text" : "password";
    btn.textContent = hidden ? "🙈" : "👁️";
  });
});

/* ── Fetch helper ── */
async function postJson(url, payload) {
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const raw = await response.text();
  let data;
  try { data = raw ? JSON.parse(raw) : {}; }
  catch (_) { throw new Error("Server returned an invalid response. Please restart backend server."); }
  if (!response.ok) throw new Error(data.message || "Request failed.");
  return data;
}
</script>
